global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "alert_rules.yml"

scrape_configs:
  # Prometheus self monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus-server'
          service: 'monitoring'

  # MLflow Model Serving Exporter
  - job_name: 'ml_model_exporter'
    static_configs:
      - targets: ['localhost:8000']
        labels:
          instance: '127.0.0.1:8000'
          job: 'ml_model_exporter'
          service: 'mlflow-titanic-model'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node/System Exporter (jika menggunakan node_exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          instance: 'localhost'
          service: 'system-metrics'
    scrape_interval: 30s
